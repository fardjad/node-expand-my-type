name: test-and-release

on:
  push:
    branches:
      - main
    paths-ignore:
      - "LICENSE"
  pull_request:
    paths-ignore:
      - "LICENSE"

permissions:
  id-token: write # Required for OIDC
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - uses: oven-sh/setup-bun@main
        with:
          bun-version: "latest"
      - name: Install
        run: bun install --frozen-lockfile
      - name: Check
        run: bun run check
      - name: Build
        run: bun run build
  version-check:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@main
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@main
        with:
          bun-version: "latest"
      - name: Fetch tags
        run: git fetch --force --tags
      - id: check
        shell: bun {0}
        run: |
          import { $ } from "bun";

          const githubOutput = process.env.GITHUB_OUTPUT;
          if (!githubOutput) {
            throw new Error("GITHUB_OUTPUT is not set");
          }

          const { version } = await Bun.file("package.json").json();
          const tagRef = `refs/tags/v${version}`;

          let changed = "true";

          try {
            await $`git rev-parse -q --verify ${tagRef}`.text();
            changed = "false";
          } catch {}

          await Bun.write(
            githubOutput,
            `version=${version}\nchanged=${changed}\n`,
          );
  release:
    runs-on: ubuntu-latest
    needs: version-check
    if: needs.version-check.outputs.changed == 'true'
    steps:
      - uses: actions/checkout@main
      - name: "Add $GITHUB_WORKSPACE to git safe directories"
        run: |
          git config --global --add safe.directory $GITHUB_WORKSPACE || exit 1
      - uses: rickstaa/action-create-tag@main
        with:
          tag: v${{ needs.version-check.outputs.version }}
          message: v${{ needs.version-check.outputs.version }}
      - uses: ncipollo/release-action@main
        with:
          name: v${{ needs.version-check.outputs.version }}
          tag: v${{ needs.version-check.outputs.version }}
          token: ${{ secrets.GITHUB_TOKEN }}
  publish:
    runs-on: ubuntu-latest
    needs: release
    if: needs.version-check.outputs.changed == 'true'
    steps:
      - uses: actions/checkout@main
      - uses: oven-sh/setup-bun@main
        with:
          bun-version: "latest"
      - name: Install
        run: bun install --frozen-lockfile
      - name: Build
        run: bun run build
      - name: Configure npm auth
        run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish
        run: bun publish
